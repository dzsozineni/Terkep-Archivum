<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I. Katonai Felmérés – Történelmi Térkép</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Cinzel (térképes elegancia) + Source Sans 3 (UI) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* =====================================================
           ALAP ELRENDEZÉS
           ===================================================== */
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            font-family: 'Source Sans 3', sans-serif;
        }

        #map {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* =====================================================
           FEJLÉC – bal felső sarok (pointer-events:none →
           nem zavarja a térkép navigációját)
           ===================================================== */
        .map-title {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: rgba(20, 16, 10, 0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(210, 175, 110, 0.35);
            border-radius: 6px;
            padding: 10px 16px;
            pointer-events: none;
        }

        .map-title h1 {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            letter-spacing: 0.08em;
            color: #d4aa6a;
            margin: 0 0 2px 0;
            line-height: 1.2;
        }

        .map-title p {
            font-size: 11px;
            color: rgba(220, 200, 160, 0.65);
            margin: 0;
            letter-spacing: 0.04em;
        }

        /* =====================================================
           ÁTLÁTSZÓSÁG-CSÚSZKA – bal alsó sarok
           ===================================================== */
        .slider-container {
            background: rgba(20, 16, 10, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(210, 175, 110, 0.3);
            border-radius: 8px;
            padding: 12px 16px 14px;
            min-width: 210px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.45);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .slider-label {
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.07em;
            color: #c8a05a;
            text-transform: uppercase;
        }

        .slider-value {
            font-size: 13px;
            font-weight: 600;
            color: #e8cfa0;
            min-width: 36px;
            text-align: right;
        }

        /* Range input – cross-browser */
        .opacity-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(
                to right,
                #c8a05a var(--pct, 75%),
                rgba(255,255,255,0.12) var(--pct, 75%)
            );
            outline: none;
            cursor: pointer;
            display: block;
        }

        .opacity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #d4aa6a;
            border: 2px solid #1a1a1a;
            box-shadow: 0 0 0 2px rgba(210, 170, 106, 0.5);
            cursor: grab;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .opacity-slider::-webkit-slider-thumb:active {
            cursor: grabbing;
            transform: scale(1.15);
            box-shadow: 0 0 0 4px rgba(210, 170, 106, 0.35);
        }

        .opacity-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #d4aa6a;
            border: 2px solid #1a1a1a;
            box-shadow: 0 0 0 2px rgba(210, 170, 106, 0.5);
            cursor: grab;
        }

        /* =====================================================
           LEAFLET KONTROLLOK TÉMA
           ===================================================== */
        .leaflet-control-layers {
            border: 1px solid rgba(210, 175, 110, 0.3) !important;
            border-radius: 6px !important;
            background: rgba(20, 16, 10, 0.88) !important;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #e8cfa0 !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4) !important;
        }

        .leaflet-control-layers-expanded {
            padding: 10px 14px !important;
        }

        .leaflet-control-layers label {
            color: #d4c090 !important;
            font-size: 13px;
        }

        .leaflet-control-layers-separator {
            border-top: 1px solid rgba(210, 175, 110, 0.2) !important;
        }

        .leaflet-control-attribution {
            background: rgba(0,0,0,0.5) !important;
            color: rgba(255,255,255,0.55) !important;
            font-size: 10px !important;
        }

        .leaflet-control-attribution a {
            color: rgba(210,175,110,0.7) !important;
        }

        /* =====================================================
           RESZPONZÍV
           ===================================================== */
        @media (max-width: 480px) {
            .slider-container { min-width: 170px; }
            .map-title h1 { font-size: 11px; }
            .map-title p  { display: none; }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="map-title">
    <h1>I. Katonai Felmérés</h1>
    <p>18. század · Mapire / Arcanum · © Google Maps</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// =============================================================
// 1. TÉRKÉP INICIALIZÁLÁSA
// Középpont: Magyarország közepe, zoom: 9
// =============================================================
var map = L.map('map', {
    center: [47.1, 19.5],
    zoom: 9,
    zoomControl: true
});

// =============================================================
// 2. ALAPRÉTEG: Google Műholdkép (XYZ tiles)
// =============================================================
var googleSatellite = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
    {
        attribution: '&copy; Google Maps',
        maxZoom: 20
    }
).addTo(map);

// =============================================================
// 3. TÖRTÉNELMI RÉTEG: I. Katonai Felmérés
//
// MIÉRT NEM AZ ELTE WMS?
// A lazarus.elte.hu WMS szerver CORS-fejléceket nem küld,
// ezért böngészőből (GitHub Pages-ről) az összes kérést
// blokkolja a Same-Origin Policy. Csak szerveroldali proxy-n
// át lenne elérhető.
//
// MEGOLDÁS: Az Arcanum/Mapire nyilvános, CORS-kompatibilis
// XYZ tile szerverét használjuk – ugyanaz az adatforrás,
// de böngészőből közvetlenül elérhető, max zoom: 15.
// Forrás: https://www.arcanum.com/en/mapire/wmts/
// =============================================================
var elsoKatonai = L.tileLayer(
    'https://tiles.mapire.eu/mercator/europe-18century-firstsurvey/{z}/{x}/{y}',
    {
        attribution: '&copy; <a href="https://mapire.eu" target="_blank">Arcanum Mapire</a> – I. Katonai Felmérés',
        maxZoom: 15,    // a szerver max felbontása
        opacity: 0.75   // induló 75% láthatóság
    }
).addTo(map);

// =============================================================
// 4. ÁTLÁTSZÓSÁG-CSÚSZKA VEZÉRLŐ
//
// *** KULCS FIX AZ 1.0-hoz KÉPEST ***
// Az addEventListener az onAdd() BELSEJÉBE kerül,
// ahol a DOM elem már létezik. Az 1.0-ban a slider
// keresése addTo() ELŐTT futott → null volt → csend.
// =============================================================
var sliderControl = L.control({ position: 'bottomleft' });

sliderControl.onAdd = function(map) {
    var container = L.DomUtil.create('div', 'slider-container');

    // Megakadályozzuk a véletlen térkép-elhúzást és görgetést
    L.DomEvent.disableClickPropagation(container);
    L.DomEvent.disableScrollPropagation(container);

    container.innerHTML = `
        <div class="slider-header">
            <span class="slider-label">Történelmi térkép</span>
            <span class="slider-value" id="opacity-val">75%</span>
        </div>
        <input
            type="range"
            class="opacity-slider"
            id="opacity-range"
            min="0" max="100" value="75"
            style="--pct: 75%"
        >
    `;

    // *** AZ ESEMÉNYKEZELŐ ITT, onAdd-on BELÜL ***
    var slider    = container.querySelector('#opacity-range');
    var valueLabel = container.querySelector('#opacity-val');

    slider.addEventListener('input', function() {
        var pct = this.value;
        elsoKatonai.setOpacity(pct / 100);
        valueLabel.textContent = pct + '%';
        this.style.setProperty('--pct', pct + '%');
    });

    return container;
};

sliderControl.addTo(map);

// =============================================================
// 5. RÉTEGKAPCSOLÓ – jobb felső sarok
// =============================================================
var baseMaps    = { "🛰 Google Műhold": googleSatellite };
var overlayMaps = { "📜 I. Katonai Felmérés (18. sz.)": elsoKatonai };

L.control.layers(baseMaps, overlayMaps, {
    position:  'topright',
    collapsed: false
}).addTo(map);

</script>
</body>
</html>
